name: open-excalidraw

# Apply after compose.yaml when PostgreSQL is externally managed:
# docker compose -f compose.yaml -f compose.managed.yaml up -d
services:
  postgres:
    profiles: [bundled-database]

  app:
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to the managed PostgreSQL connection URL}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
