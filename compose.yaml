name: open-excalidraw

services:
  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_excalidraw}
      POSTGRES_USER: ${POSTGRES_USER:-open_excalidraw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  app:
    image: ${OPEN_EXCALIDRAW_IMAGE:-open-excalidraw:local}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_PORT: 3000
      SOCKET_ALLOWED_ORIGINS: ${SOCKET_ALLOWED_ORIGINS:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      ADMIN_RESET_TOKEN: ${ADMIN_RESET_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-open_excalidraw}:${POSTGRES_PASSWORD:-}@postgres:5432/${POSTGRES_DB:-open_excalidraw}}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /data/assets
      MAINTENANCE_INTERVAL_MS: ${MAINTENANCE_INTERVAL_MS:-21600000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Open Excalidraw <noreply@example.com>}
    volumes:
      - asset-data:/data/assets
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-3000}:3000"
    networks:
      - edge
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.10.2-alpine
    profiles: [https]
    restart: unless-stopped
    stop_grace_period: 10s
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:2019/config/",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

networks:
  edge:
  backend:
    internal: true

volumes:
  postgres-data:
  asset-data:
  caddy-data:
  caddy-config:
